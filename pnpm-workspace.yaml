packages:
  - apps/*
  - packages/*

# Pnpm catalog: single source of truth for shared dependency versions across
# the monorepo. Packages reference these via `"catalog:"` in their package.json.
catalog:
  # Next.js + React (latest stable per Apr 2026)
  next: ^16.0.0
  react: ^19.0.0
  react-dom: ^19.0.0

  # TypeScript
  typescript: ^5.7.0
  "@types/node": ^22.10.0
  "@types/react": ^19.0.0
  "@types/react-dom": ^19.0.0

  # Tailwind 4
  tailwindcss: ^4.0.0
  "@tailwindcss/postcss": ^4.0.0

  # Drizzle
  drizzle-orm: ^0.36.0
  drizzle-kit: ^0.28.0
  postgres: ^3.4.0

  # Supabase
  "@supabase/supabase-js": ^2.46.0
  "@supabase/ssr": ^0.5.0

  # State + validation
  "@tanstack/react-query": ^5.59.0
  zod: ^3.23.0

  # Payload CMS
  payload: ^3.0.0
  "@payloadcms/db-postgres": ^3.0.0
  "@payloadcms/next": ^3.0.0
  "@payloadcms/richtext-lexical": ^3.0.0
  "@payloadcms/ui": ^3.0.0
  sharp: ^0.34.5

  # Twilio Verify (Phase 3 D3 — merchant claim flow)
  twilio: ^6.0.0

  # Linting
  eslint-config-next: ^16.0.0
